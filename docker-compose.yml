

services:

  frontend:
    build: ./frontend
    container_name: frontend
    ports:
      - "8090:80"
    depends_on:
      - backend

  backend:
    build: ./backend
    container_name: backend
    ports:
      - "3032:3000"
    depends_on:
      - db

  db:
    image: mysql:8.0
    container_name: mysql
    restart: always

    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: mydb

    ports:
      - "3308:3306"

    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql-data:
